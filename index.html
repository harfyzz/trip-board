<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Trip Board — Detective Travel Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Caveat:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/@rive-app/canvas@2.38.1"></script>
<style>
  :root {
    /* Figma design tokens */
    --text-default: #1e1e1e;
    --text-secondary: #757575;
    --text-tertiary: #b3b3b3;
    --surface: #ffffff;
    --radius-card: 18.65px;
    --radius-image: 13.14px;
    --radius-pill: 8px;
    --radius-sm: 4px;
    /* card drop shadow ("newShadow") */
    --card-shadow:
      0 4px 4px -4px rgba(12, 12, 13, 0.05),
      0 16px 32px -4px rgba(12, 12, 13, 0.10);

    /* board theme */
    --accent: #f2542d;        /* stay highlight + sparkle red */
    --accent-2: #ff9d4d;      /* sparkle orange */
    --string: #ffa4f0;        /* connecting thread */
    --board-bg: #fafafa;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    font-family: 'Inter', system-ui, sans-serif;
    color: var(--text-default);
    user-select: none;
    -webkit-user-select: none;
  }

  /* ---- Board surface ---- */
  #board {
    position: absolute;
    inset: 0;
    background-color: var(--board-bg);
    background-image:
      radial-gradient(circle at 1px 1px, rgba(0,0,0,.06) 1px, transparent 0);
    background-size: 26px 26px;
    cursor: grab;
  }
  #board.panning { cursor: grabbing; }

  /* The transformable world that holds cards + strings */
  #world {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    transform-origin: 0 0;
  }

  /* Large handwritten vacation-plan title, painted onto the board behind
     the cards (pans + zooms with the world). */
  #board-title {
    position: absolute;
    left: 2000px; top: 1140px;
    transform: translate(-50%, -50%);
    width: max-content;
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 0;
  }
  #wine-canvas {
    width: 500px; height: 500px;
    margin-bottom: -100px;          /* tuck it onto the title */
    pointer-events: none;
  }
  #board-title-text {
    text-align: center;
    font-family: 'Caveat', cursive;
    font-weight: 700;
    font-size: 160px;
    line-height: 1.02;
    color: #d6d6d6;
    cursor: default;
  }

  #strings {
    position: absolute;
    top: 0; left: 0;
    width: 4000px; height: 3000px;
    overflow: visible;
    pointer-events: none;
  }
  #strings path {
    stroke: var(--string);
    stroke-width: 3;
    stroke-linecap: round;
    fill: none;
  }

  /* =========================================================
     CARD  — matches Figma "CardComponent" (node 75:327)
     A draggable column: white card + handwritten quote below.
     ========================================================= */
  .card {
    position: absolute;
    top: 0; left: 0;
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 298px;
    cursor: grab;
  }
  .card:active { cursor: grabbing; }
  /* Only hint compositing while dragging — otherwise the layer is rasterized
     at natural size and looks blurry when the board is zoomed in. */
  .card.dragging { z-index: 999 !important; will-change: transform; }
  .card.dragging .paper { box-shadow: 0 24px 48px -8px rgba(12,12,13,.28), 0 8px 16px -6px rgba(12,12,13,.16); }

  .paper {
    background: var(--surface);
    border-radius: var(--radius-card);
    padding: 8px 8px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    box-shadow: var(--card-shadow);
    transition: box-shadow .15s ease;
    position: relative;
  }
  /* card-hover menu (Figma 105:559 closed, 105:536 open) — sits 6px outside
     the card's right edge for both the closed button and the open popover */
  .card-menu {
    position: absolute;
    top: 14px;
    left: calc(100% + 6px);
    z-index: 6;
  }
  .card-menu-btn {
    position: relative;                      /* anchor for the larger hit area */
    display: flex;
    align-items: center;
    justify-content: center;
    width: 32px; height: 24px;
    padding: 0;
    background: #fff;
    border: none;
    border-radius: 16px;
    color: #1e1e1e;
    cursor: pointer;
    box-shadow: var(--card-shadow);
    opacity: 0;                              /* hidden by default */
    transition: opacity .15s ease;
  }
  /* transparent halo extending the clickable area without changing the pill */
  .card-menu-btn::before {
    content: '';
    position: absolute;
    inset: -14px;
  }
  .card:hover .card-menu-btn { opacity: 1; }
  /* when the menu opens, the dots step out — the popover takes their slot */
  .card-menu.open .card-menu-btn { display: none; }
  .card-menu-pop {
    position: absolute;
    top: 0; left: 0;                          /* takes the trigger's position */
    display: none;
    flex-direction: column;
    align-items: flex-start;
    padding: 8px;
    background: #fff;
    border-radius: 16px;
    box-shadow: var(--card-shadow);
    min-width: 132px;
  }
  .card-menu.open .card-menu-pop { display: flex; }
  .card-menu-item {
    background: none;
    border: none;
    padding: 10px;
    width: 100%;
    text-align: left;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 500;
    font-size: 14px;
    line-height: 1.2;
    color: #757575;
    cursor: pointer;
    border-radius: 6px;
    transition: color .12s ease, background .12s ease;
  }
  .card-menu-item:hover { color: #303030; background: #f3f3f3; }

  /* pushpin sitting on the top edge of each card — kept paint-cheap so it
     doesn't slow card dragging (no gradients/inset shadows) */
  .pin {
    position: absolute;
    left: 50%; top: 0;
    width: 18px; height: 18px;
    transform: translate(-50%, -55%);
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 2px 3px rgba(0,0,0,.3);
    pointer-events: none;
    z-index: 5;
  }
  .pin::after {
    content: '';
    position: absolute;
    left: 50%; top: 100%;
    width: 2px; height: 5px;
    transform: translate(-50%, -1px);
    background: #888;
  }

  /* --- image area --- */
  .photo-wrap {
    position: relative;
    width: 282px;
    height: 250px;
    border-radius: var(--radius-image);
    overflow: hidden;
  }
  .photo {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    background: #ddd;
    pointer-events: none;
  }

  /* tag pill (bottom-right of photo) */
  .tag-pill {
    position: absolute;
    right: 6px; bottom: 6px;
    display: flex;
    align-items: center;
    gap: 4px;
    background: var(--surface);
    padding: 4px 8px;
    border-radius: var(--radius-pill);
    box-shadow: 0 2px 8px rgba(0,0,0,.22);
  }
  .tag-pill .tag-ic { width: 14px; height: 14px; color: var(--text-default); flex: none; }
  .tag-pill span {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 500;
    font-size: 12px;
    line-height: 1.2;
    color: var(--text-default);
    white-space: nowrap;
  }

  /* photo-count stack (bottom-left of photo) — Figma node 75:326.
     Three thumbnails cascade right + recede smaller; front one is biggest
     and on top, with a count pill over its lower-left corner. */
  .stack {
    position: absolute;
    left: 12px; bottom: 8px;
    width: 59px; height: 46px;
    pointer-events: none;
  }
  .stack .thumb {
    position: absolute;
    object-fit: cover;
    border: 1.419px solid #fff;
    box-shadow: 0 2px 5px rgba(0,0,0,.25);
  }
  .stack .t-back  { width: 33px;   height: 29.3px; left: 23.4px; top: 8.35px; border-radius: var(--radius-sm); z-index: 1; }
  .stack .t-mid   { width: 43px;   height: 38.1px; left: 10.5px; top: 3.95px; border-radius: var(--radius-pill); z-index: 2; }
  .stack .t-front { width: 48.9px; height: 43.3px; left: 1.56px; top: 1.35px; border-radius: var(--radius-pill); z-index: 3; }
  .stack .count {
    position: absolute;
    left: 1px; bottom: 1px;
    z-index: 4;
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 19px;
    height: 27px;
    padding: 0 5px;
    margin: 0 0 4px 4px;
    background: var(--surface);
    border-radius: 6px;
    box-shadow: 0 2px 7px rgba(0,0,0,.28);
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 16px;
    line-height: 1;
    color: var(--text-default);
  }

  /* --- text block --- */
  .text {
    display: flex;
    flex-direction: column;
    gap: 4px;
    /* aligns the title/address left edge with the image stack + stars row */
    padding-left: 12px;
  }
  .title {
    font-family: 'Caveat', cursive;
    font-weight: 700;
    font-size: 20px;
    line-height: 1.2;
    color: var(--text-default);
  }
  .addr {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 500;
    font-size: 12px;
    line-height: 1.2;
    color: var(--text-secondary);
  }

  /* --- third row: rating + price tier --- */
  .row3 {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-left: 4px;
  }
  .stars {
    padding: 4px 8px;
    border-radius: var(--radius-pill);
  }
  /* 5 star slots laid out exactly like Figma (node 75:229): overlapping
     sparkles with a little vertical jitter, trailing dots for empties. */
  .starrow { position: relative; width: 92px; height: 20px; }
  .star { position: absolute; width: 20px; height: 20px; }
  .star .sp { width: 100%; height: 100%; display: block; }
  .star .sp path { fill: #ed6222; }
  .star .dot {
    position: absolute;
    left: 50%; top: 50%;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--text-tertiary);
    transform: translate(-50%, -50%);
  }
  .tier {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 14px;
    line-height: 1.2;
    color: var(--text-default);
    padding: 4px 8px;
    border-radius: var(--radius-pill);
    white-space: nowrap;
    letter-spacing: .5px;
  }

  /* --- handwritten quote under the card --- */
  .quote {
    font-family: 'Caveat', cursive;
    font-weight: 700;
    font-size: 20px;
    line-height: 1.2;
    color: var(--text-tertiary);
    padding: 0 4px;
  }
  /* per-letter staggered fade for cycling reviews */
  .quote .qw { display: inline-block; white-space: nowrap; }
  .quote .ql { display: inline-block; opacity: 0; transition: opacity .28s ease; }

  /* --- the central "stay" card differs ONLY by its tag (Figma node 78:324):
     a dark pill with a white home icon + label. Everything else matches a
     regular spot card. --- */
  .card.stay .tag-pill { background: #2c2c2c; }
  .card.stay .tag-pill .tag-ic { color: #f5f5f5; }
  .card.stay .tag-pill span { color: #ffffff; }

  /* ---- UI chrome ---- */
  #topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 56px;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 0 18px;
    background: rgba(255,255,255,.86);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(0,0,0,.07);
    color: var(--text-default);
    z-index: 1000;
    box-shadow: 0 2px 10px rgba(0,0,0,.06);
  }
  #topbar h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 18px;
    margin: 0;
    letter-spacing: .3px;
  }
  #topbar .sub {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    margin-right: auto;
  }
  button.btn {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-default);
    background: #efeaf6;
    border: 1px solid rgba(0,0,0,.06);
    padding: 8px 14px;
    border-radius: var(--radius-pill);
    cursor: pointer;
    transition: transform .08s ease, background .15s ease;
  }
  button.btn:hover { background: #e7e0f2; }
  button.btn:active { transform: translateY(1px); }
  button.btn.btn-icon {
    padding: 7px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: #343330;
  }
  button.btn.btn-icon svg { display: block; }

  #hint {
    position: fixed;
    bottom: 14px; left: 50%;
    transform: translateX(-50%);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    color: var(--text-default);
    background: rgba(255,255,255,.85);
    border: 1px solid rgba(0,0,0,.06);
    padding: 6px 14px;
    border-radius: 20px;
    z-index: 1000;
    pointer-events: none;
  }

  /* ===== WORLD MAP VIEW ===== */
  #map-view { position: absolute; inset: 0; }
  #map { position: absolute; inset: 0; background: #e8eef0; }
  #map-title {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    font-family: 'Caveat', cursive; font-weight: 700; font-size: 30px;
    color: #1e1e1e; background: rgba(255,255,255,.85); backdrop-filter: blur(6px);
    padding: 4px 20px; border-radius: 16px; z-index: 600; pointer-events: none;
    box-shadow: 0 4px 16px rgba(0,0,0,.1);
  }
  #map-hint {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    font-family: 'Space Grotesk', sans-serif; font-size: 12px; color: #555;
    background: rgba(255,255,255,.85); border: 1px solid rgba(0,0,0,.06);
    padding: 6px 14px; border-radius: 20px; z-index: 600; pointer-events: none;
  }

  /* --- map marker: fanned photo cluster + name·price pill (Figma 83:430) --- */
  .mc-marker { background: none; border: none; }
  .mc { position: relative; width: 128px; height: 132px; pointer-events: none; }
  .mc-photos { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 110px; height: 86px; }
  .mc-ph {
    position: absolute; width: 86px; height: 76px; left: 12px; top: 5px;
    object-fit: cover; border: 2.6px solid #fff; border-radius: 15px; background: #ddd;
    box-shadow: 0 4px 4px -1px rgba(12,12,13,.1);
  }
  .mc-ph-l { transform: rotate(-15deg); left: 0; z-index: 1; }
  .mc-ph-r { transform: rotate(15deg); left: 24px; z-index: 1; }
  .mc-ph-c { z-index: 2; left: 12px; }
  .mc-pill {
    position: absolute; left: 50%; bottom: 0; transform: translateX(-50%);
    display: flex; align-items: center; gap: 5px; white-space: nowrap;
    background: #fff; padding: 5px 9px; border-radius: 11px;
    box-shadow: 0 4px 8px rgba(12,12,13,.16);
    font-family: 'Space Grotesk', sans-serif; font-weight: 500; font-size: 13px; color: #1e1e1e;
  }
  .mc-pill .dot { width: 4px; height: 4px; border-radius: 50%; background: #bbb; flex: none; }
  /* collapse to the text pill only when a marker would overlap another */
  .mc-photos, .mc-pill { pointer-events: auto; cursor: pointer; }
  .mc-marker.collapsed .mc-photos { display: none; }

  #back-to-map { font-size: 13px; }
  #strings path.route {
    stroke: var(--string); stroke-width: 2.5; stroke-dasharray: 1 12;
    stroke-linecap: round; opacity: .8;
  }

  /* ===== DESIGN EDITOR (temporary — remove when done) ===== */
  #tb-modebar {
    position: fixed; left: 18px; bottom: 18px; z-index: 1200;
    display: flex; background: #fff;
    border: 1px solid rgba(0,0,0,.1); border-radius: 10px; overflow: hidden;
    box-shadow: 0 6px 18px rgba(0,0,0,.14);
  }
  #tb-modebar button {
    font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 600;
    border: none; background: #fff; color: #666; padding: 9px 16px; cursor: pointer;
  }
  #tb-modebar button.on { background: #2c2c2c; color: #fff; }

  body.tb-edit .card { cursor: default; }
  body.tb-edit #board-title { pointer-events: auto; cursor: pointer; }
  /* these are pointer-events:none by default so they don't block pan/drag —
     re-enable in edit mode so they can be selected */
  body.tb-edit .photo,
  body.tb-edit .stack,
  body.tb-edit #wine-canvas { pointer-events: auto; }
  .tb-selected { outline: 2px solid #2c8cff !important; outline-offset: 2px; }

  #tb-inspector {
    position: fixed; top: 70px; right: 14px; width: 252px;
    max-height: calc(100vh - 150px); overflow: auto;
    background: #fff; border: 1px solid rgba(0,0,0,.1); border-radius: 14px;
    box-shadow: 0 12px 34px rgba(0,0,0,.16); z-index: 1200;
    display: none; flex-direction: column; padding: 14px; gap: 12px;
    font-family: 'Space Grotesk', sans-serif;
  }
  #tb-insp-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  #tb-insp-title { font-size: 13px; color: #1e1e1e; display: block; line-height: 1.3; }
  .tb-sub { color: #999; font-size: 11px; }
  #tb-hist { display: flex; gap: 4px; flex: none; }
  #tb-hist button { width: 26px; height: 24px; border: 1px solid rgba(0,0,0,.12); background: #f7f7f7; border-radius: 6px; font-size: 13px; line-height: 1; color: #333; cursor: pointer; }
  #tb-hist button:disabled { opacity: .4; cursor: default; }
  #tb-crumb { display: flex; flex-wrap: wrap; align-items: center; gap: 2px; }
  .tb-chip { border: none; background: #eef1f4; color: #555; font-family: 'Space Grotesk', sans-serif; font-size: 10px; padding: 2px 6px; border-radius: 5px; cursor: pointer; }
  .tb-chip.on { background: #2c8cff; color: #fff; }
  .tb-sep { color: #c4c4c4; font-size: 10px; }
  #tb-insp-body { display: flex; flex-direction: column; gap: 8px; }
  .tb-f { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #555; }
  .tb-f > span { flex: 1; }
  .tb-f input[type=number] { width: 58px; padding: 4px 6px; border: 1px solid #ddd; border-radius: 6px; font-size: 12px; font-family: inherit; }
  .tb-f em { color: #aaa; font-style: normal; font-size: 11px; }
  .tb-f input[type=color] { width: 26px; height: 24px; border: 1px solid #ddd; border-radius: 6px; padding: 0; background: none; cursor: pointer; }
  .tb-f .tb-hex { width: 76px; padding: 4px 6px; border: 1px solid #ddd; border-radius: 6px; font-size: 11px; font-family: inherit; }
  .tb-f select { padding: 4px 6px; border: 1px solid #ddd; border-radius: 6px; font-size: 12px; font-family: inherit; }
  #tb-insp-actions { display: flex; gap: 6px; flex-wrap: wrap; border-top: 1px solid #eee; padding-top: 10px; }
  #tb-insp-actions button { font-family: 'Space Grotesk', sans-serif; font-size: 12px; font-weight: 600; border: 1px solid rgba(0,0,0,.1); background: #f2f2f2; color: #333; padding: 7px 10px; border-radius: 8px; cursor: pointer; }
  #tb-insp-actions button.tb-primary { background: #2c8cff; color: #fff; border-color: transparent; }
  #tb-toast {
    position: fixed; left: 50%; bottom: 72px; transform: translateX(-50%);
    background: #2c2c2c; color: #fff; font-family: 'Space Grotesk', sans-serif; font-size: 12px;
    padding: 8px 14px; border-radius: 20px; z-index: 1300; opacity: 0;
    transition: opacity .2s; pointer-events: none;
  }
  #tb-toast.show { opacity: 1; }
  /* ===== /DESIGN EDITOR ===== */
</style>
</head>
<body>
  <!-- ===== WORLD MAP VIEW ===== -->
  <div id="map-view">
    <div id="map"></div>
    <div id="map-title">✈️ Places I've been</div>
    <div id="map-hint">Scroll to zoom · tap a place to open its trip board</div>
  </div>

  <!-- ===== TRIP BOARD VIEW ===== -->
  <div id="board-view" hidden>
  <div id="board">
    <div id="world">
      <div id="board-title">
        <canvas id="wine-canvas" width="1000" height="1000"></canvas>
        <div id="board-title-text"></div>
      </div>
      <svg id="strings"></svg>
    </div>
  </div>

  <div id="topbar">
    <button class="btn" id="back-to-map">← Map</button>
    <h1>🧵 Trip Board</h1>
    <span class="sub" id="trip-name">— loading case file —</span>
    <button class="btn btn-icon" id="recenter" title="Recenter">
      <svg width="20" height="20" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">

  `https://picsum.photos/seed/${encodeURIComponent(seed)}/${w}/${h}`;

// Keyword-matched photo (LoremFlickr) so each spot's image fits its tag.
// `lock` keeps the image stable per seed; Picsum is the fallback on failure.
function hashNum(s) {
  let h = 2166136261;
  for (let i = 0; i < s.length; i++) { h = (h ^ s.charCodeAt(i)) >>> 0; h = (h * 16777619) >>> 0; }
  return h % 100000;
}
function imgFor(keywords, seed, w = 480, h = 360) {
  const tags = String(keywords).split(',').map(k => encodeURIComponent(k.trim())).filter(Boolean).join(',');
  return `https://loremflickr.com/${w}/${h}/${tags}?lock=${hashNum(seed + tags)}`;
}
function tagImg(cls, keywords, seed, w, h) {
  return `<img class="${cls}" src="${imgFor(keywords, seed, w, h)}" data-fb="${PHOTO(seed, w, h)}" alt="" loading="lazy" />`;
}

// Build the 5-star row for a given rating (1–5). Filled slots use the Figma
// sparkle with the same overlapping layout + vertical jitter; the remaining
// slots are dots. Step/offsets mirror Figma node 75:229.
function starsHTML(rating) {
  let out = '';
  for (let i = 0; i < 5; i++) {
    const on = i < rating;
    const top = on ? (i % 2 === 0 ? 3 : -3) : 0;
    out += `<span class="star" style="left:${i * 13}px;top:${top}px" aria-hidden="true">`;
    out += on
      ? `<svg class="sp" viewBox="0 0 20 20">${SPARK_PATH}</svg>`

    out += '</span>';
  }
  return `<div class="starrow">${out}</div>`;
}

// Pick 7 distinct reviews for a card to cycle through.
function pickReviews(isStay) {
  const pool = isStay ? STAY_REVIEWS : Object.values(REVIEWS).flat();
  return [...pool].sort(() => Math.random() - 0.5).slice(0, 7).map(f => `“${f}”`);
}

// Split a quote into per-word / per-letter spans so it can fade letter by
// letter. Each letter gets an increasing transition-delay for the stagger.
function buildQuoteSpans(text) {
  let idx = 0;
  return text.split(' ').map(word => {
    const letters = [...word].map(ch => {
      const s = `<span class="ql" style="transition-delay:${idx * 11}ms">${ch}</span>`;
      idx++;
      return s;
    }).join('');
    idx++; // count the space so the next word keeps the rhythm
    return `<span class="qw">${letters}</span>`;
  }).join(' ');
}

function setQuote(el, text) {
  el.innerHTML = buildQuoteSpans(text);
  // Force a reflow so the opacity:0 starting state is committed before we flip
  // to 1 — otherwise the browser can batch both into one style recalc and the
  // letters snap in all at once instead of transitioning in sequence.
  void el.offsetWidth;
  el.querySelectorAll('.ql').forEach(s => { s.style.opacity = '1'; });
}

// Fade the current quote out (letter by letter), then swap in the next one.
function cycleQuote(c) {
  const spans = [...c.quoteEl.querySelectorAll('.ql')];
  spans.forEach((s, i) => { s.style.transitionDelay = `${i * 9}ms`; s.style.opacity = '0'; });
  const outMs = spans.length * 9 + 300;
  c.swapTimer = setTimeout(() => {
    c.qi = (c.qi + 1) % c.reviews.length;
    setQuote(c.quoteEl, c.reviews[c.qi]);
  }, outMs);
}

// Attach the rotating review list to a card and start its cycle (phases are
// randomised so the cards don't all flip at the same instant).
function setupQuotes(c, reviews) {
  c.quoteEl = c.el.querySelector('.quote');
  c.reviews = reviews;
  c.qi = 0;
  setQuote(c.quoteEl, reviews[0]);
  const tick = () => { if (!editMode) cycleQuote(c); c.timer = setTimeout(tick, 5000); };
  c.timer = setTimeout(tick, randInt(3000, 7000));
}

function priceTier(v) {
  if (v <= 0) return 'Free';
  if (v < 10) return '$';
  if (v < 25) return '$$';
  return '$$$';
}

/* ---- Board state ----------------------------------------------------- */

// Build one card element matching the Figma design.
function makeCard({ name, addr, tag, priceLabel, rating, photoCount, seed, isStay }) {

// Position a card by its CENTER using transform only (cheap during drag).
function place(c) {
  const x = c.x - c.w / 2;
  const y = c.y - c.h / 2;
  c.el.style.transform = `translate(${x}px, ${y}px) rotate(${c.tilt}deg)`;
}

function registerCard(el, x, y, tiltRange) {
  const c = {
    el, x, y,
    w: el.offsetWidth, h: el.offsetHeight,
    tilt: +(Math.random() * tiltRange * 2 - tiltRange).toFixed(2),
  };
  cards.push(c);
  place(c);
  return c;
}

// Where each base sits on the board (offsets from world centre), by base count.
const BASE_ANCHORS = {
  1: [[0, 0]],
  2: [[-1050, -120], [1050, 120]],
  3: [[-1100, -360], [1150, -260], [0, 600]],
  4: [[-1120, -470], [1120, -470], [-1120, 560], [1120, 560]],
};

let currentDest = null;
const bases = [];   // base (stay) cards, in travel order

function buildBoard(dest) {
  currentDest = dest;
  clearBoard();
  bases.length = 0;

  document.getElementById('trip-name').textContent =
    `Case file: ${dest.city} · ${randInt(4, 12)} days`;
  document.getElementById('board-title-text').innerHTML =
    `${dest.city} Vacation<br>${new Date().getFullYear()}`;

  const cx = WORLD_W / 2, cy = WORLD_H / 2;
  const nBases = randInt(1, 4);
  const anchors = BASE_ANCHORS[nBases];
  const stayNames = [...STAY_NAMES].sort(() => Math.random() - 0.5);
  const spotPool = [...SPOTS].sort(() => Math.random() - 0.5);
  let spotIdx = 0;

  for (let b = 0; b < nBases; b++) {
    const bx = cx + anchors[b][0], by = cy + anchors[b][1];

    // --- a base (where they stayed) ---
    const stayPrice = randInt(60, 320);
    const stayRating = randInt(4, 5);
    const baseEl = makeCard({
      name: stayNames[b % stayNames.length],
      addr: `${randInt(1, 180)} ${rand(dest.streets)}, ${dest.city}`,
      tag: rand(STAY_KINDS),
      priceLabel: `${dest.cur}${stayPrice}/night`,
      rating: stayRating,
      photoCount: randInt(6, 14),
      seed: `stay-${b}-${Math.random().toString(36).slice(2, 7)}`,
      isStay: true,
    });
    const baseCard = registerCard(baseEl, bx, by, 1.5);
    setupQuotes(baseCard, pickReviews(true));
    bases.push(baseCard);

    // --- its ring of spots ---
    const n = randInt(3, 5);
    const radius = 440;
    for (let i = 0; i < n; i++) {
      const spot = spotPool[spotIdx++ % spotPool.length];
      const angle = (i / n) * Math.PI * 2 + (Math.random() * 0.4 - 0.2);
      const r = radius + randInt(-40, 90);
      const x = bx + Math.cos(angle) * r * 1.3;
      const y = by + Math.sin(angle) * r;
      const price = spot.base > 0 ? spot.base + randInt(-3, 12) : 0;
      const rating = randInt(2, 5);
      const el = makeCard({
        name: spot.name,
        addr: `${randInt(1, 180)} ${rand(dest.streets)}, ${dest.city}`,
        tag: spot.tag,
        priceLabel: priceTier(price),
        rating,
        photoCount: randInt(3, 9),
        seed: `spot-${b}-${i}-${Math.random().toString(36).slice(2, 7)}`,
        isStay: false,
      });
      const c = registerCard(el, x, y, 3);
      setupQuotes(c, pickReviews(false));
      makeString(baseCard, c);
    }
  }

  // route line connecting the bases in travel order
  for (let b = 0; b < bases.length - 1; b++) makeString(bases[b], bases[b + 1], { route: true });

  stayCard = bases[0];
  drawStrings();
}

/* ---- Strings (SVG quadratic curves with a little physics) ------------ */
const SVG_NS = 'http://www.w3.org/2000/svg';
const links = []; // {from, to, path, cx, cy, vx, vy}
let slack = 0.70; // 0 = taut straight line, higher = more droop

const STIFF = 0.2;   // higher = snappier
const DAMP = 0.82;   // lower = wobblier

function makeString(from, to, opts) {
  const path = document.createElementNS(SVG_NS, 'path');
  if (opts && opts.route) path.classList.add('route');
  svg.appendChild(path);
  const lk = { from, to, path, cx: 0, cy: 0, vx: 0, vy: 0 };
  const t = restControl(lk);
  lk.cx = t.x; lk.cy = t.y;
  links.push(lk);
}

function restControl(lk) {
  const { x: x1, y: y1 } = lk.from;
  const { x: x2, y: y2 } = lk.to;
  const dist = Math.hypot(x2 - x1, y2 - y1);
  const sag = slack * dist * 0.5;
  return { x: (x1 + x2) / 2, y: (y1 + y2) / 2 + sag * 2 };
}

function renderString(lk) {
  const { x: x1, y: y1 } = lk.from;
  const { x: x2, y: y2 } = lk.to;
  lk.path.setAttribute('d', `M ${x1} ${y1} Q ${lk.cx} ${lk.cy} ${x2} ${y2}`);
}

function drawStrings() {
  for (const lk of links) {
    const t = restControl(lk);
    lk.cx = t.x; lk.cy = t.y; lk.vx = 0; lk.vy = 0;
    renderString(lk);
  }
}

let rafId = null;
function physicsStep() {
  let moving = false;
  for (const lk of links) {

    lk.cy += lk.vy;

/* ---- Pan / Zoom ------------------------------------------------------ */
let scale = 1, panX = 0, panY = 0;

  world.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
}

function recenter(animate = false) {
  const vw = window.innerWidth, vh = window.innerHeight;
  let nScale, nPanX, nPanY;
  if (!cards.length) {
    nScale = 0.55;
    nPanX = vw / 2 - (WORLD_W / 2) * nScale;
    nPanY = vh / 2 - (WORLD_H / 2) * nScale;
  } else {
    // fit all cards (any number of bases) into view
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (const c of cards) {
      minX = Math.min(minX, c.x - c.w / 2); maxX = Math.max(maxX, c.x + c.w / 2);
      minY = Math.min(minY, c.y - c.h / 2); maxY = Math.max(maxY, c.y + c.h / 2);
    }
    const pad = 140;
    nScale = Math.min(vw / (maxX - minX + pad * 2), (vh - 80) / (maxY - minY + pad * 2), 0.7);
    const ccx = (minX + maxX) / 2, ccy = (minY + maxY) / 2;

    nPanY = (vh + 56) / 2 - ccy * nScale;

    targetScale = nScale; targetPanX = nPanX; targetPanY = nPanY;

    applyView();

/* ---- smoothly interpolated zoom ---- */
let targetScale = scale, targetPanX = panX, targetPanY = panY, zoomRaf = null;
const ZOOM_LERP = 0.27;

function tickZoom() {
  const dS = targetScale - scale;
  const dX = targetPanX - panX;
  const dY = targetPanY - panY;
  if (Math.abs(dS) < 0.0005 && Math.abs(dX) < 0.2 && Math.abs(dY) < 0.2) {
    scale = targetScale; panX = targetPanX; panY = targetPanY;
    applyView();
    zoomRaf = null;
    return;
  }
  scale += dS * ZOOM_LERP;
  panX += dX * ZOOM_LERP;
  panY += dY * ZOOM_LERP;
  applyView();
  zoomRaf = requestAnimationFrame(tickZoom);
}
function nudgeZoom() { if (zoomRaf === null) zoomRaf = requestAnimationFrame(tickZoom); }

board.addEventListener('wheel', (e) => {
  e.preventDefault();
  // exponential scale step proportional to wheel delta — smoother than the
  // old fixed 1.1/0.9 jumps, and trackpad pinch (small deltas) feels finer
  const factor = Math.exp(-e.deltaY * 0.0025);
  const newTarget = Math.min(2, Math.max(0.2, targetScale * factor));
  const mx = e.clientX, my = e.clientY;
  // anchor the zoom under the cursor (against the *target*, not current)
  targetPanX = mx - (mx - targetPanX) * (newTarget / targetScale);
  targetPanY = my - (my - targetPanY) * (newTarget / targetScale);
  targetScale = newTarget;
  nudgeZoom();
}, { passive: false });

  // drag (each frame would otherwise re-write the world transform while we

const SPOT_TAGS = SPOTS.map(s => s.tag);
function handleMenuAction(card, act) {
  const el = card.el;
  const paper = el.querySelector('.paper');
  const tagSpan = el.querySelector('.tag-pill span');
  if (act === 'tag') {
    const isStay = el.classList.contains('stay');
    const pool = isStay ? STAY_KINDS : SPOT_TAGS;
    const cur = tagSpan.textContent.trim();
    const next = pool[(pool.indexOf(cur) + 1) % pool.length];
    tagSpan.textContent = next;
    // refresh images to match the new keyword
    const kw = TAG_KEYWORDS[next] || next.toLowerCase();
    const newSeed = next + '-' + Math.random().toString(36).slice(2, 7);
    const swap = (img, w, h, suf) => {
      img.dataset.fb = PHOTO(newSeed + suf, w, h);
      img.src = imgFor(kw, newSeed + suf, w, h);
    };
    swap(el.querySelector('.photo'), 760, 570, '');
    swap(el.querySelector('.t-back'), 160, 140, '-c');
    swap(el.querySelector('.t-mid'),  160, 140, '-b');
    swap(el.querySelector('.t-front'),160, 140, '-a');
  } else if (act === 'dup') {
    const clone = el.cloneNode(true);
    clone.classList.remove('dragging');
    world.appendChild(clone);
    const c = {
      el: clone, x: card.x + 220, y: card.y + 60,
      w: card.w, h: card.h,
      tilt: +(Math.random() * 6 - 3).toFixed(2),
    };
    cards.push(c);
    place(c);
    // wire it back to a base (nearest one)
    let nearest = bases[0], best = Infinity;
    for (const b of bases) {
      const d = Math.hypot(b.x - c.x, b.y - c.y);
      if (d < best) { best = d; nearest = b; }
    }
    if (nearest && nearest !== c) makeString(nearest, c);
    drawStrings();
  } else if (act === 'fix') {
    // straighten the card and snap it back to its anchor (visual "tidy")
    card.tilt = 0;
    place(card);
  } else if (act === 'del') {
    // drop any strings touching this card
    for (let i = links.length - 1; i >= 0; i--) {
      if (links[i].from === card || links[i].to === card) {
        links[i].path.remove();
        links.splice(i, 1);
      }
    }
    el.remove();
    const idx = cards.indexOf(card);
    if (idx >= 0) cards.splice(idx, 1);
    const bIdx = bases.indexOf(card);
    if (bIdx >= 0) bases.splice(bIdx, 1);
  }
}

  }
  if (el.tagName === 'SPAN' && el.closest('.tag-pill')) return { sel: '.tag-pill span', name: 'Tag label' };
  for (const { sel, name } of EDITABLE) {
    if (sel[0] === '.' && !sel.includes(' ') && el.classList.contains(sel.slice(1))) return { sel, name };
  }
  const cls = [...el.classList].filter(c => !DYNAMIC_CLASSES.has(c));

    const pc = [...p.classList].filter(c => !DYNAMIC_CLASSES.has(c));

        <div class="mc-pill">${dest.name}<span class="dot"></span>${dest.cur}${price.toLocaleString()}</div>
      </div>`;
    const icon = L.divIcon({ className: 'mc-marker', html, iconSize: [128, 132], iconAnchor: [64, 132] });
    const marker = L.marker([dest.lat, dest.lng], { icon }).addTo(map).on('click', () => openBoard(dest));
    MAP_MARKERS.push({ marker, latlng: [dest.lat, dest.lng], price });
    pts.push([dest.lat, dest.lng]);
  }
  map.fitBounds(pts, { padding: [90, 90] });
  map.on('zoomend moveend resize', declutter);
  map.whenReady(declutter);
}

function rectsOverlap(a, b) {
  return a.left < b.right && a.right > b.left && a.top < b.bottom && a.bottom > b.top;
}
// box around a marker's geo pixel point (anchored at the pill, photos extend up)
function markerBox(p, expanded) {
  return expanded
    ? { left: p.x - 62, right: p.x + 62, top: p.y - 132, bottom: p.y + 4 }
    : { left: p.x - 58, right: p.x + 58, top: p.y - 30, bottom: p.y + 4 };
}
// Symmetric declutter: a marker shows its photos only if its expanded photo
// cluster wouldn't intersect ANY other marker's expanded cluster at the
// current zoom. If two markers would overlap, both collapse to text pills —
// no "winner takes the space" asymmetry.
function declutter() {
  if (!map) return;
  const items = MAP_MARKERS.map(m => ({
    el: m.marker.getElement(),
    box: markerBox(map.latLngToContainerPoint(m.latlng), true),
  }));
  for (let i = 0; i < items.length; i++) {
    if (!items[i].el) continue;
    let intersects = false;
    for (let j = 0; j < items.length; j++) {
      if (i !== j && rectsOverlap(items[i].box, items[j].box)) { intersects = true; break; }
    }
    items[i].el.classList.toggle('collapsed', intersects);
  }
}

/* ---- Rive wine animation sitting on the big title ---- */
let wineRive = null, wineHover = null, wineInited = false;
function initWine() {
  if (wineInited || typeof rive === 'undefined') return;
  wineInited = true;
  wineRive = new rive.Rive({
    src: 'wine.riv',
    canvas: document.getElementById('wine-canvas'),
    artboard: 'Wine',
    stateMachines: 'State Machine 1',
    autoplay: true,
    autoBind: true,
    onLoad: () => {
      try {
        let vmi = wineRive.viewModelInstance;
        if (!vmi) {
          const vm = wineRive.viewModelByName('WineVm');
          vmi = vm.defaultInstance ? vm.defaultInstance() : vm.instance();
          wineRive.bindViewModelInstance(vmi);
        }
        wineHover = vmi.boolean('isHovered');
      } catch (e) { console.warn('Wine view-model bind failed:', e); }
    },
  });
  const titleText = document.getElementById('board-title-text');
  titleText.addEventListener('mouseenter', () => { if (wineHover) wineHover.value = true; });
  titleText.addEventListener('mouseleave', () => { if (wineHover) wineHover.value = false; });
}

function openBoard(dest) {
  document.getElementById('map-view').style.display = 'none';
  document.getElementById('board-view').hidden = false;
  buildBoard(dest);
  recenter();
  ensureAnim();
  initWine();
}
function showMap() {
  setMode(false);
  document.getElementById('board-view').hidden = true;
  document.getElementById('map-view').style.display = 'block';
  if (map) setTimeout(() => map.invalidateSize(), 0);
}
document.getElementById('back-to-map').addEventListener('click', showMap);

/* ---- Init ------------------------------------------------------------ */
setupMap();
</script>
